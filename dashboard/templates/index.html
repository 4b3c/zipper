<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zipper Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
</head>
<body class="bg-slate-900 text-white h-screen overflow-hidden">
    <div class="flex h-full">
        <!-- Sidebar -->
        <div class="w-64 bg-slate-800 border-r border-slate-700 flex flex-col">
            <div class="p-4 border-b border-slate-700">
                <h1 class="text-xl font-bold mb-4">🤖 Zipper</h1>
                <button id="new-chat-btn"
                        class="w-full px-3 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm font-medium transition">
                    + New Chat
                </button>
            </div>
            
            <div id="conversation-list" class="flex-1 overflow-y-auto p-3">
                <!-- Conversations load here -->
                <div class="text-slate-400 text-sm animate-pulse">Loading conversations...</div>
            </div>
            
            <div class="border-t border-slate-700 p-4 text-xs text-slate-400">
                <div class="mb-3">Resources</div>
                <div class="space-y-2">
                    <a href="#" class="block hover:text-white transition">📋 Tasks</a>
                    <a href="#" class="block hover:text-white transition">💾 Memory</a>
                    <a href="#" class="block hover:text-white transition">📊 Status</a>
                </div>
            </div>
        </div>
        
        <!-- Main Chat Area -->
        <div class="flex-1 flex flex-col bg-slate-900">
            <div id="chat-container" class="flex-1 flex flex-col">
                <!-- Chat view or empty state -->
                <div class="flex-1 flex items-center justify-center text-slate-400">
                    <div class="text-center">
                        <div class="text-4xl mb-4">🤖</div>
                        <div class="text-2xl font-bold mb-2">Welcome to Zipper</div>
                        <div class="text-slate-500">Select a conversation or start a new one</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
