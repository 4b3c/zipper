<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zipper Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Markdown body */
        .markdown-body { line-height: 1.65; color: #e2e8f0; }
        .markdown-body p { margin: 0 0 0.75em; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            font-weight: 600; margin: 1em 0 0.5em; line-height: 1.3;
        }
        .markdown-body h1 { font-size: 1.25em; }
        .markdown-body h2 { font-size: 1.1em; }
        .markdown-body h3 { font-size: 1em; color: #94a3b8; }
        .markdown-body ul, .markdown-body ol { padding-left: 1.5em; margin: 0.5em 0; }
        .markdown-body li { margin: 0.2em 0; }
        .markdown-body code:not(pre code) {
            background: #1e293b; border: 1px solid #334155;
            padding: 0.1em 0.4em; border-radius: 4px;
            font-size: 0.85em; font-family: 'SFMono-Regular', Consolas, monospace;
            color: #93c5fd;
        }
        .markdown-body pre {
            background: #0f172a; border: 1px solid #1e293b;
            border-radius: 8px; padding: 1em; overflow-x: auto;
            margin: 0.75em 0; font-size: 0.82em; line-height: 1.5;
        }
        .markdown-body pre code { background: none; border: none; padding: 0; color: inherit; font-size: inherit; }
        .markdown-body blockquote {
            border-left: 3px solid #334155; padding-left: 1em;
            margin: 0.5em 0; color: #94a3b8; font-style: italic;
        }
        .markdown-body strong { font-weight: 600; color: #f1f5f9; }
        .markdown-body a { color: #60a5fa; text-decoration: underline; }
        .markdown-body hr { border: none; border-top: 1px solid #1e293b; margin: 1em 0; }
        .markdown-body table { border-collapse: collapse; width: 100%; font-size: 0.9em; }
        .markdown-body th, .markdown-body td { border: 1px solid #334155; padding: 0.4em 0.8em; }
        .markdown-body th { background: #1e293b; font-weight: 600; }

        /* User bubble markdown */
        .user-bubble .markdown-body { color: #fff; }
        .user-bubble .markdown-body code:not(pre code) {
            background: rgba(0,0,0,0.2); border-color: rgba(255,255,255,0.2); color: #bfdbfe;
        }
        .user-bubble .markdown-body pre { background: rgba(0,0,0,0.25); border-color: rgba(255,255,255,0.1); }
        .user-bubble .markdown-body strong { color: #fff; }

        /* Textarea auto-grow */
        #chat-input {
            resize: none;
            min-height: 40px;
            max-height: 160px;
            overflow-y: auto;
            line-height: 1.5;
        }

        /* Bounce animation delays */
        .bounce-1 { animation-delay: 0ms; }
        .bounce-2 { animation-delay: 150ms; }
        .bounce-3 { animation-delay: 300ms; }
    </style>
</head>
<body class="bg-slate-900 text-white h-screen overflow-hidden" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;">
    <div class="flex h-full">
        <!-- Sidebar -->
        <div class="w-64 bg-slate-950/80 border-r border-slate-800 flex flex-col flex-shrink-0">
            <div class="p-4 border-b border-slate-800">
                <div class="flex items-center gap-2 mb-4">
                    <div class="w-7 h-7 rounded-lg bg-violet-700 flex items-center justify-center text-sm font-bold select-none">Z</div>
                    <span class="font-semibold text-slate-100">Zipper</span>
                </div>
                <button id="new-chat-btn"
                        class="w-full px-3 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-500 text-sm font-medium transition">
                    + New Chat
                </button>
            </div>

            <div id="conversation-list" class="flex-1 overflow-y-auto p-2">
                <div class="text-slate-500 text-xs p-2 animate-pulse">Loading...</div>
            </div>

            <div class="border-t border-slate-800 p-3">
                <div class="space-y-1">
                    <a href="#" class="flex items-center gap-2 px-2 py-1.5 rounded-md text-xs text-slate-400 hover:text-slate-200 hover:bg-slate-800 transition">
                        <span>📋</span> Tasks
                    </a>
                    <a href="#" class="flex items-center gap-2 px-2 py-1.5 rounded-md text-xs text-slate-400 hover:text-slate-200 hover:bg-slate-800 transition">
                        <span>💾</span> Memory
                    </a>
                    <a href="#" class="flex items-center gap-2 px-2 py-1.5 rounded-md text-xs text-slate-400 hover:text-slate-200 hover:bg-slate-800 transition">
                        <span>📊</span> Status
                    </a>
                </div>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Top bar -->
            <div class="flex items-center px-5 py-3 border-b border-slate-800 flex-shrink-0 min-h-[52px]">
                <div id="conv-title" class="text-sm font-medium text-slate-300"></div>
                <div id="conv-status" class="ml-3 text-xs text-slate-500"></div>
            </div>

            <div id="chat-container" class="flex-1 flex flex-col overflow-hidden">
                <!-- Empty state -->
                <div class="flex-1 flex items-center justify-center text-slate-500">
                    <div class="text-center">
                        <div class="w-14 h-14 rounded-2xl bg-violet-700/20 border border-violet-700/30 flex items-center justify-center text-2xl font-bold text-violet-400 mx-auto mb-4 select-none">Z</div>
                        <div class="text-lg font-semibold text-slate-300 mb-1">Zipper</div>
                        <div class="text-sm">Select a conversation or start a new one</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
